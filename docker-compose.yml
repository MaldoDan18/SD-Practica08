services:
  frontend:
    build:
      context: ./webapp
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
    command: ["python", "servidor.py", "--host", "0.0.0.0", "--port", "8080", "--ticket-service-host", "ticketing_service", "--ticket-service-port", "7000"]
    ports:
      - "8080:8080"
    depends_on:
      ticketing_service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)).get('status'))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  ticketing_service:
    build:
      context: .
    command: ["python", "ticketing_service.py", "--host", "0.0.0.0", "--port", "7000", "--store-file", "tickets/tickets.txt"]
    ports:
      - "7000:7000"
    volumes:
      - ./tickets:/app/tickets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 7000), 2); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
